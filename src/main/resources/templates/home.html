<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GX Sneaker</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="navbar">

    <!-- Logo -->
    <div class="logo">
        <span class="gx">GX</span>
        <span class="sneaker">SNEAKER</span>
    </div>

    <!-- Menu -->
    <nav class="menu">
        <a href="#">Trang chủ</a>
        <a href="#">Nam</a>
        <a href="#">Nữ</a>
        <a href="#">Thương hiệu</a>
        <a href="#">Bộ sưu tập</a>
        <a href="#">Sale</a>
    </nav>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Tìm kiếm sản phẩm...">
        <button>
            <i class="fas fa-search"></i>
        </button>
    </div>

    <!-- Actions -->
    <div class="actions">

        <div class="action-item">
            <i class="far fa-user"></i>
            <span>Đăng nhập</span>
        </div>

        <div class="action-item">
            <div class="icon-wrap">
                <i class="far fa-heart"></i>
            </div>
            <span>Yêu thích</span>
        </div>

        <div class="action-item">
            <div class="icon-wrap">
                <i class="fas fa-cart-shopping"></i>
            </div>
            <span>Giỏ hàng</span>
        </div>

    </div>

</header>

<!-- BANNER -->
<section class="hero">
    <img id="bannerSlider" src="/images/banner1.png">

    <div class="slider-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
    </div>
</section>

<!--link js-->
<script th:src="@{/js/slider.js}"></script>

</body>
</html>
